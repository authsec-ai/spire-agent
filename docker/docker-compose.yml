version: '3.8'

# SPIRE Agent - Docker Deployment
# Configured for Docker-based workload attestation (NOT Kubernetes).
#
# Usage:
#   Single tenant:  docker-compose up spire-agent-1
#   All tenants:    docker-compose up
#   With env file:  docker-compose --env-file .env up
#
# Prerequisites:
#   - Docker socket must be accessible (/var/run/docker.sock)
#   - Optional: Place trust-bundle.pem in this directory for mTLS with ICP service

x-agent-common: &agent-common
  build:
    context: ..
    dockerfile: Dockerfile
  networks:
    - spire-network
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 10s

services:
  # ──────────────────────────────────────────────
  # Tenant 1
  # ──────────────────────────────────────────────
  spire-agent-1:
    <<: *agent-common
    container_name: spire-agent-docker-tenant-1
    hostname: docker-agent-node-1
    environment:
      # Agent identity
      ICP_AGENT_AGENT__TENANT_ID: "${TENANT_ID_1:-477e9f97-d8a9-442a-8d92-f771393fab66}"
      ICP_AGENT_AGENT__NODE_ID: "${NODE_ID_1:-docker-node-1}"
      ICP_AGENT_AGENT__DATA_DIR: /var/lib/spire-agent
      ICP_AGENT_AGENT__SOCKET_PATH: /run/spire/sockets/agent.sock

      # ICP service
      ICP_AGENT_ICP_SERVICE__ADDRESS: "${ICP_SERVICE_ADDRESS:-https://prod.api.authsec.ai/spiresvc}"
      ICP_AGENT_ICP_SERVICE__TRUST_BUNDLE_PATH: /etc/spire-agent/trust-bundle.pem

      # Docker attestation
      ICP_AGENT_ATTESTATION__TYPE: docker

      # Logging
      ICP_AGENT_LOGGING__LEVEL: "${LOG_LEVEL:-info}"
      ICP_AGENT_LOGGING__FORMAT: json

      # Health
      ICP_AGENT_HEALTH__PORT: 8080
      ICP_AGENT_HEALTH__BIND_ADDRESS: 0.0.0.0
    ports:
      - "${HEALTH_PORT_1:-8080}:8080"
    volumes:
      # Docker socket - required for Docker attestation
      - /var/run/docker.sock:/var/run/docker.sock:ro

      # Persistent data and socket
      - agent-data-1:/var/lib/spire-agent
      - agent-socket-1:/run/spire/sockets

      # Config file
      - ./config.docker.yaml:/app/config.yaml:ro

      # Trust bundle (uncomment when available)
      # - ./trust-bundle.pem:/etc/spire-agent/trust-bundle.pem:ro

  # ──────────────────────────────────────────────
  # Tenant 2 (uncomment to enable)
  # ──────────────────────────────────────────────
  # spire-agent-2:
  #   <<: *agent-common
  #   container_name: spire-agent-docker-tenant-2
  #   hostname: docker-agent-node-2
  #   environment:
  #     ICP_AGENT_AGENT__TENANT_ID: "${TENANT_ID_2:-your-second-tenant-id}"
  #     ICP_AGENT_AGENT__NODE_ID: "${NODE_ID_2:-docker-node-2}"
  #     ICP_AGENT_AGENT__DATA_DIR: /var/lib/spire-agent
  #     ICP_AGENT_AGENT__SOCKET_PATH: /run/spire/sockets/agent.sock
  #     ICP_AGENT_ICP_SERVICE__ADDRESS: "${ICP_SERVICE_ADDRESS:-https://prod.api.authsec.ai/spiresvc}"
  #     ICP_AGENT_ICP_SERVICE__TRUST_BUNDLE_PATH: /etc/spire-agent/trust-bundle.pem
  #     ICP_AGENT_ATTESTATION__TYPE: docker
  #     ICP_AGENT_LOGGING__LEVEL: "${LOG_LEVEL:-info}"
  #     ICP_AGENT_LOGGING__FORMAT: json
  #     ICP_AGENT_HEALTH__PORT: 8080
  #     ICP_AGENT_HEALTH__BIND_ADDRESS: 0.0.0.0
  #   ports:
  #     - "${HEALTH_PORT_2:-8081}:8080"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #     - agent-data-2:/var/lib/spire-agent
  #     - agent-socket-2:/run/spire/sockets
  #     - ./config.docker.yaml:/app/config.yaml:ro
  #     # - ./trust-bundle.pem:/etc/spire-agent/trust-bundle.pem:ro

volumes:
  agent-data-1:
    driver: local
  agent-socket-1:
    driver: local
  # agent-data-2:
  #   driver: local
  # agent-socket-2:
  #   driver: local

networks:
  spire-network:
    driver: bridge
