version: '3.8'

# Multi-tenant ICP Agent deployment
# Usage:
#   Single tenant:  TENANT_ID=477e9f97-... docker-compose up icp-agent-1
#   All tenants:    docker-compose up
#   Add more:       Copy a service block, change tenant ID, node ID, ports, and volume names

x-agent-common: &agent-common
  build:
    context: .
    dockerfile: Dockerfile
  networks:
    - icp-network
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 10s

services:
  # Tenant 1: 477e9f97-d8a9-442a-8d92-f771393fab66
  icp-agent-1:
    <<: *agent-common
    container_name: icp-agent-tenant-1
    hostname: agent-node-1
    environment:
      ICP_AGENT_AGENT__TENANT_ID: "477e9f97-d8a9-442a-8d92-f771393fab66"
      ICP_AGENT_AGENT__NODE_ID: node-1
      ICP_AGENT_AGENT__DATA_DIR: /var/lib/icp-agent
      ICP_AGENT_AGENT__SOCKET_PATH: /var/run/icp-agent/api.sock
      ICP_AGENT_ICP_SERVICE__ADDRESS: ${ICP_SERVICE_ADDRESS:-https://prod.api.authsec.ai/spiresvc}
      ICP_AGENT_ICP_SERVICE__TRUST_BUNDLE_PATH: /etc/icp-agent/trust-bundle.pem
      ICP_AGENT_ATTESTATION__TYPE: kubernetes
      ICP_AGENT_LOGGING__LEVEL: ${LOG_LEVEL:-info}
      ICP_AGENT_LOGGING__FORMAT: json
      ICP_AGENT_HEALTH__PORT: 8080
      ICP_AGENT_HEALTH__BIND_ADDRESS: 0.0.0.0
    ports:
      - "8080:8080"
    volumes:
      - agent-data-1:/var/lib/icp-agent
      - agent-socket-1:/var/run/icp-agent
      - ./config.yaml:/app/config.yaml:ro
      # - ./trust-bundle.pem:/etc/icp-agent/trust-bundle.pem:ro

  # Tenant 2: Add your second tenant ID here
  # icp-agent-2:
  #   <<: *agent-common
  #   container_name: icp-agent-tenant-2
  #   hostname: agent-node-2
  #   environment:
  #     ICP_AGENT_AGENT__TENANT_ID: "your-second-tenant-id"
  #     ICP_AGENT_AGENT__NODE_ID: node-2
  #     ICP_AGENT_AGENT__DATA_DIR: /var/lib/icp-agent
  #     ICP_AGENT_AGENT__SOCKET_PATH: /var/run/icp-agent/api.sock
  #     ICP_AGENT_ICP_SERVICE__ADDRESS: ${ICP_SERVICE_ADDRESS:-https://prod.api.authsec.ai/spiresvc}
  #     ICP_AGENT_ICP_SERVICE__TRUST_BUNDLE_PATH: /etc/icp-agent/trust-bundle.pem
  #     ICP_AGENT_ATTESTATION__TYPE: kubernetes
  #     ICP_AGENT_LOGGING__LEVEL: ${LOG_LEVEL:-info}
  #     ICP_AGENT_LOGGING__FORMAT: json
  #     ICP_AGENT_HEALTH__PORT: 8080
  #     ICP_AGENT_HEALTH__BIND_ADDRESS: 0.0.0.0
  #   ports:
  #     - "8081:8080"
  #   volumes:
  #     - agent-data-2:/var/lib/icp-agent
  #     - agent-socket-2:/var/run/icp-agent
  #     - ./config.yaml:/app/config.yaml:ro

volumes:
  agent-data-1:
    driver: local
  agent-socket-1:
    driver: local
  # agent-data-2:
  #   driver: local
  # agent-socket-2:
  #   driver: local

networks:
  icp-network:
    driver: bridge
